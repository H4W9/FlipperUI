name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  frontend:
    name: Frontend — typecheck & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

  rust:
    name: Rust — fmt, clippy, test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Tauri v2 on Linux needs webkit2gtk, soup3, and friends to build.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            pkg-config \
            build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --lib

  # Full Tauri bundle build on each desktop target — catches platform-specific
  # build issues and produces artifacts for manual testing.
  #
  # macOS gets two entries: one native Apple Silicon build and one Intel build
  # cross-compiled on the same runner via the `x86_64-apple-darwin` Rust target.
  # The host SDK on `macos-latest` ships both architectures, so cross-compiling
  # works without needing a second runner. Each (os, target) pair writes its
  # bundle under `target/<target>/release/bundle/...`; the `bundle_path` matrix
  # value keeps the upload step tidy.
  bundle:
    name: Bundle — tauri build (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-AppleSilicon
            bundle_path: target/aarch64-apple-darwin/release/bundle
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
            bundle_path: target/x86_64-apple-darwin/release/bundle
          - os: ubuntu-latest
            target: ""
            label: Linux
            bundle_path: target/release/bundle
          - os: windows-latest
            target: ""
            label: Windows
            bundle_path: target/release/bundle
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          # Empty `targets:` is a no-op; the action installs only the host
          # toolchain. When set, it also installs the requested cross-target
          # (e.g. x86_64-apple-darwin) without us calling `rustup` ourselves.
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libudev-dev \
            pkg-config \
            build-essential

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # Separate cache shard per target so the Intel build doesn't clobber
          # the Apple Silicon one (and vice versa). For non-cross targets the
          # shard is just the host name.
          key: ${{ matrix.label }}

      - name: Install npm dependencies
        run: npm ci

      - name: Read app version
        id: version
        shell: bash
        run: echo "APP_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> "$GITHUB_OUTPUT"

      - name: Tauri build
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --ci --target ${{ matrix.target }}
          else
            npm run tauri build -- --ci
          fi

      # Upload the resulting bundles for each target as workflow artifacts so
      # they can be downloaded from the Actions UI.
      - name: Upload bundle (Windows)
        if: matrix.label == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: FlipperUI_v${{ steps.version.outputs.APP_VERSION }}_Windows
          if-no-files-found: error
          path: |
            src-tauri/${{ matrix.bundle_path }}/msi/*.msi
            src-tauri/${{ matrix.bundle_path }}/nsis/*.exe

      - name: Upload bundle (macOS Apple Silicon)
        if: matrix.label == 'macOS-AppleSilicon'
        uses: actions/upload-artifact@v4
        with:
          name: FlipperUI_v${{ steps.version.outputs.APP_VERSION }}_macOS-AppleSilicon
          if-no-files-found: error
          path: |
            src-tauri/${{ matrix.bundle_path }}/dmg/*.dmg
            src-tauri/${{ matrix.bundle_path }}/macos/*.app

      - name: Upload bundle (macOS Intel)
        if: matrix.label == 'macOS-Intel'
        uses: actions/upload-artifact@v4
        with:
          name: FlipperUI_v${{ steps.version.outputs.APP_VERSION }}_macOS-Intel
          if-no-files-found: error
          path: |
            src-tauri/${{ matrix.bundle_path }}/dmg/*.dmg
            src-tauri/${{ matrix.bundle_path }}/macos/*.app

      - name: Upload bundle (Linux)
        if: matrix.label == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: FlipperUI_v${{ steps.version.outputs.APP_VERSION }}_Linux
          if-no-files-found: error
          path: |
            src-tauri/${{ matrix.bundle_path }}/deb/*.deb
            src-tauri/${{ matrix.bundle_path }}/rpm/*.rpm
            src-tauri/${{ matrix.bundle_path }}/appimage/*.AppImage
