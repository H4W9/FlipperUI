<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlipperUI</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
        -webkit-user-select: none;
        user-select: none;
        -webkit-app-region: drag;
      }
      .splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        color: #e4e4e7;
      }
      .splash h1 {
        font-size: 26px;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.01em;
      }
      .splash h1 span {
        color: #ff8300;
      }
      .splash p {
        font-size: 12px;
        color: #71717a;
        margin: 0;
        letter-spacing: 0.02em;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(255, 131, 0, 0.15);
        border-top-color: #ff8300;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="spinner"></div>
      <h1>Flipper<span>UI</span></h1>
      <p>Starting up…</p>
    </div>
  </body>
</html>
