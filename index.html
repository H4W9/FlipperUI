<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/flipperui-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FlipperUI</title>
    <style>
      html, body { margin: 0; padding: 0; height: 100%; background: #000; }
      #root { height: 100%; }
      .app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        background: #000;
        color: #71717a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      .app-boot-spinner {
        width: 36px;
        height: 36px;
        border: 3px solid #27272a;
        border-top-color: #ff8300;
        border-radius: 50%;
        animation: app-boot-spin 0.9s linear infinite;
      }
      .app-boot-label {
        font-size: 13px;
        letter-spacing: 0.02em;
      }
      @keyframes app-boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-boot">
        <div class="app-boot-spinner"></div>
        <div class="app-boot-label">Loading FlipperUI…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
